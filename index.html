<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOD OF SERVER · NEBULA</title>
  <!-- Font Awesome 6 (free) for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0b0d1e, #030514);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* main app container – hidden until login */
    .app {
      max-width: 1400px;
      width: 100%;
      height: 90vh;
      background: rgba(10, 20, 30, 0.4);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 255, 255, 0.25);
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.05);
      border-radius: 42px;
      display: none;  /* toggled by login */
      grid-template-columns: 280px 1fr 320px;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .app.active {
      display: grid;
    }

    /* ---------- GLASS NEON ELEMENTS ---------- */
    .glass-panel {
      background: rgba(0, 15, 25, 0.7);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(0, 255, 255, 0.3);
      border-left: 1px solid rgba(0, 255, 255, 0.15);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.1) inset;
    }

    /* ---------- LOGIN OVERLAY ---------- */
    .login-container {
      background: rgba(4, 10, 18, 0.9);
      backdrop-filter: blur(20px);
      border: 2px solid #00f7ff;
      border-radius: 40px;
      padding: 40px 32px;
      width: 400px;
      max-width: 90%;
      box-shadow: 0 0 60px #00e0ff, 0 0 20px rgba(0, 255, 255, 0.6) inset;
      transition: 0.3s;
      animation: neonPulse 3s infinite alternate;
    }

    @keyframes neonPulse {
      0% { box-shadow: 0 0 30px #00ffff, 0 0 15px #00ccff inset; }
      100% { box-shadow: 0 0 70px #ff00c8, 0 0 30px #ff00b3 inset; }
    }

    .login-container h2 {
      color: #b5ffff;
      text-shadow: 0 0 8px cyan;
      font-size: 2.2rem;
      letter-spacing: 2px;
      margin-bottom: 32px;
      text-align: center;
      font-weight: 500;
    }

    .input-field {
      margin-bottom: 28px;
      position: relative;
    }

    .input-field label {
      display: block;
      color: #9effff;
      text-shadow: 0 0 4px cyan;
      margin-bottom: 8px;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    .input-field input {
      width: 100%;
      background: rgba(0, 30, 40, 0.6);
      border: 1px solid #0ff;
      border-radius: 40px;
      padding: 14px 20px;
      font-size: 1rem;
      color: #e0f0ff;
      outline: none;
      transition: all 0.2s;
      box-shadow: 0 0 10px #0ff, inset 0 0 10px #004444;
    }

    .input-field input:focus {
      border-color: #ff66ff;
      box-shadow: 0 0 20px #ff66ff, inset 0 0 20px #330033;
    }

    .login-btn {
      background: transparent;
      border: 2px solid #0ff;
      color: #0ff;
      font-size: 1.5rem;
      font-weight: 600;
      padding: 14px 0;
      width: 100%;
      border-radius: 60px;
      margin-top: 20px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 4px;
      transition: 0.3s;
      text-shadow: 0 0 8px cyan;
      box-shadow: 0 0 30px cyan;
    }

    .login-btn:hover {
      background: cyan;
      color: black;
      border-color: magenta;
      box-shadow: 0 0 60px magenta;
      font-weight: bold;
    }

    .error-msg {
      color: #ff7bac;
      text-shadow: 0 0 6px #ff0066;
      margin-top: 8px;
      font-size: 0.9rem;
      min-height: 22px;
    }

    /* ---------- SIDEBAR (ACTIVE MEMBERS) ---------- */
    .members-sidebar {
      background: rgba(0, 12, 24, 0.8);
      backdrop-filter: blur(16px);
      border-right: 2px solid #0ff;
      display: flex;
      flex-direction: column;
      padding: 24px 0 20px 0;
    }

    .sidebar-header {
      padding: 0 16px 20px 16px;
      border-bottom: 1px dashed #0ff7;
      margin-bottom: 20px;
    }

    .sidebar-header h3 {
      color: #ffffff;
      text-shadow: 0 0 6px #0ff;
      font-weight: 400;
      letter-spacing: 2px;
      font-size: 1.2rem;
    }

    .online-users-list {
      list-style: none;
      flex: 1;
      overflow-y: auto;
      padding: 0 12px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      margin-bottom: 8px;
      background: rgba(0, 255, 255, 0.03);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 28px;
      cursor: pointer;
      transition: all 0.2s;
      color: #b0f0ff;
      backdrop-filter: blur(5px);
    }

    .user-item:hover {
      border-color: #ff0af0;
      box-shadow: 0 0 18px #ff00cc;
      background: rgba(20, 40, 55, 0.8);
      transform: scale(1.02);
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(145deg, #00d4ff, #b700ff);
      border-radius: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
      font-weight: bold;
      box-shadow: 0 0 12px cyan;
    }

    .online-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 12px;
      height: 12px;
      background: #00ff9f;
      border-radius: 50%;
      border: 2px solid #0a0f1a;
      box-shadow: 0 0 12px #00ff80;
    }

    .user-name {
      flex: 1;
      font-size: 1rem;
      font-weight: 400;
    }

    /* ---------- CHAT ZONE (center) ---------- */
    .chat-center {
      display: flex;
      flex-direction: column;
      background: rgba(0, 6, 12, 0.5);
      border-right: 1px solid #0ff3;
    }

    .chat-tabs {
      display: flex;
      padding: 20px 20px 0 20px;
      gap: 20px;
      border-bottom: 1px solid cyan;
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: #6fc3ff;
      font-size: 1.4rem;
      padding: 8px 20px;
      cursor: pointer;
      border-radius: 40px 40px 0 0;
      transition: 0.2s;
      text-shadow: 0 0 5px cyan;
      font-weight: 500;
      letter-spacing: 1px;
      border-bottom: 2px solid transparent;
    }

    .tab-btn.active {
      color: white;
      background: rgba(0, 255, 255, 0.12);
      border-bottom: 2px solid magenta;
      box-shadow: 0 -4px 12px rgba(255, 0, 255, 0.3);
    }

    .chat-window {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* message bubbles */
    .message {
      max-width: 75%;
      padding: 12px 18px;
      border-radius: 28px;
      font-size: 0.95rem;
      word-break: break-word;
      line-height: 1.4;
      animation: appear 0.2s ease;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(10px); }
    }

    .message.own {
      align-self: flex-end;
      background: #00474e;
      border: 1px solid cyan;
      color: #e4fffe;
      box-shadow: 0 0 20px cyan;
      border-bottom-right-radius: 6px;
    }

    .message.other {
      align-self: flex-start;
      background: #1f1a3a;
      border: 1px solid #ff4dff;
      color: #f0e2ff;
      box-shadow: 0 0 15px #ff44ee;
      border-bottom-left-radius: 6px;
    }

    .message-input-area {
      display: flex;
      padding: 18px 20px 22px 20px;
      gap: 12px;
      background: rgba(0, 22, 33, 0.6);
      border-top: 1px solid #0ff;
    }

    .message-input-area input {
      flex: 1;
      background: #091c28;
      border: 1px solid #00ffee;
      border-radius: 60px;
      padding: 16px 24px;
      color: white;
      font-size: 1rem;
      outline: none;
      box-shadow: 0 0 10px #0ff4;
    }

    .message-input-area button {
      background: transparent;
      border: 2px solid #ff0ab9;
      color: #ffb3fd;
      width: 60px;
      height: 60px;
      border-radius: 60px;
      font-size: 1.8rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 25px #ff00b3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .message-input-area button:hover {
      background: #ff0ab9;
      color: black;
      border-color: cyan;
      box-shadow: 0 0 40px cyan;
    }

    /* ---------- CALL SECTION (right panel) ---------- */
    .call-panel {
      background: rgba(0, 6, 18, 0.75);
      backdrop-filter: blur(24px);
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      gap: 30px;
    }

    .call-actions {
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
    }

    .call-btn {
      width: 100%;
      background: rgba(10, 30, 40, 0.5);
      border: 2px solid #0ff;
      border-radius: 60px;
      padding: 22px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: cyan;
      font-size: 1.6rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 30px cyan;
      backdrop-filter: blur(8px);
    }

    .call-btn.video {
      border-color: #ff66ff;
      box-shadow: 0 0 30px #ff44ee;
      color: #ffb6ff;
    }

    .call-btn:hover {
      background: cyan;
      color: #0a0f1f;
      border-color: magenta;
      box-shadow: 0 0 60px magenta;
    }

    /* popup ui */
    .call-popup {
      background: rgba(2, 20, 33, 0.95);
      border: 3px solid #ff00d0;
      border-radius: 48px;
      padding: 32px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      box-shadow: 0 0 90px #ff00c8, inset 0 0 40px #00ffff;
      backdrop-filter: blur(20px);
      margin-top: 20px;
    }

    .popup-avatar {
      width: 90px;
      height: 90px;
      background: linear-gradient(45deg, cyan, magenta);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      font-weight: bold;
      color: black;
      box-shadow: 0 0 40px magenta;
    }

    .popup-info {
      color: white;
      text-align: center;
    }

    .popup-info h4 {
      font-size: 1.8rem;
      text-shadow: 0 0 12px cyan;
    }

    .popup-info p {
      color: cyan;
      font-size: 1.2rem;
    }

    .popup-controls {
      display: flex;
      gap: 30px;
    }

    .popup-controls i {
      font-size: 2.4rem;
      background: #1a2635;
      padding: 20px;
      border-radius: 50%;
      border: 2px solid cyan;
      color: cyan;
      box-shadow: 0 0 20px;
      transition: 0.2s;
      cursor: pointer;
    }

    .popup-controls i.fa-phone-slash {
      border-color: #ff4466;
      color: #ff7799;
      box-shadow: 0 0 30px red;
    }

    /* responsive */
    @media (max-width: 900px) {
      .app.active { grid-template-columns: 1fr; }
      .members-sidebar, .call-panel { display: none; }
    }

    /* dummy scroll */
    .chat-window::-webkit-scrollbar { width: 6px; background: #001a1a; }
    .chat-window::-webkit-scrollbar-thumb { background: cyan; border-radius: 10px; }
  </style>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="login-container">
    <h2>⚡LOGIN·NEBULA⚡</h2>
    <div class="input-field">
      <label><i class="fa-regular fa-envelope" style="margin-right: 8px;"></i>CYBER MAIL</label>
      <input type="email" id="emailInput" placeholder="ghost@server.io">
    </div>
    <div class="input-field">
      <label><i class="fa-solid fa-lock" style="margin-right: 8px;"></i>PASSCODE</label>
      <input type="password" id="passwordInput" placeholder="••••••••">
    </div>
    <div id="loginError" class="error-msg"></div>
    <button class="login-btn" id="loginBtn">⎋ ENTER ⎋</button>
    <div style="text-align: center; margin-top: 28px; color: #80ffff; text-shadow: 0 0 4px;">demo: any credentials</div>
  </div>

  <!-- MAIN APP (hidden by default) -->
  <div class="app" id="appContainer">
    <!-- left: active members -->
    <aside class="members-sidebar glass-panel">
      <div class="sidebar-header">
        <h3><i class="fa-solid fa-circle-nodes" style="margin-right: 10px;"></i>ACTIVE·MEMBERS</h3>
      </div>
      <ul class="online-users-list" id="userList">
        <!-- dynamically from js -->
      </ul>
      <div style="padding: 20px; border-top: 1px dashed cyan; color: #4ff; font-size: 0.9rem;">
        <i class="fa-regular fa-eye"></i> 7 online
      </div>
    </aside>

    <!-- center: chat -->
    <main class="chat-center">
      <div class="chat-tabs">
        <button class="tab-btn active" id="tabPrivate">👤 1-TO-1</button>
        <button class="tab-btn" id="tabGroup">👥 GROUP</button>
      </div>
      <!-- chat messages -->
      <div class="chat-window" id="chatMessages">
        <!-- js will populate -->
      </div>
      <!-- input -->
      <div class="message-input-area">
        <input type="text" id="messageInput" placeholder="Type your quantum message...">
        <button id="sendMsgBtn"><i class="fa-regular fa-paper-plane"></i></button>
      </div>
    </main>

    <!-- right: call section -->
    <aside class="call-panel">
      <div class="call-actions">
        <div class="call-btn" id="voiceCallBtn"><i class="fa-solid fa-phone"></i> VOICE</div>
        <div class="call-btn video" id="videoCallBtn"><i class="fa-solid fa-video"></i> VIDEO</div>
      </div>
      <!-- call popup UI (always visible demo) -->
      <div class="call-popup" id="callPopup">
        <div class="popup-avatar">👾</div>
        <div class="popup-info">
          <h4>NEO</h4>
          <p>🔵 incoming call ...</p>
        </div>
        <div class="popup-controls">
          <i class="fa-solid fa-phone"></i>
          <i class="fa-solid fa-phone-slash"></i>
          <i class="fa-solid fa-microphone-slash"></i>
        </div>
      </div>
    </aside>
  </div>

  <script>
    (function() {
      // ----- LOGIC -----
      const loginScreen = document.getElementById('loginScreen');
      const app = document.getElementById('appContainer');
      const emailInput = document.getElementById('emailInput');
      const passwordInput = document.getElementById('passwordInput');
      const loginBtn = document.getElementById('loginBtn');
      const loginError = document.getElementById('loginError');

      // login handler (frontend validation only)
      function handleLogin(e) {
        e.preventDefault();
        const email = emailInput.value.trim();
        const pass = passwordInput.value.trim();

        if (!email || !pass) {
          loginError.innerText = '⛔ ACCESS DENIED: all fields required';
          return;
        }
        // just show main app, hide login
        loginScreen.style.display = 'none';
        app.classList.add('active');
      }

      loginBtn.addEventListener('click', handleLogin);
      // also allow enter key on password field
      passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(e); });

      // ----- POPULATE ACTIVE MEMBERS (green dot + click to open chat) -----
      const users = [
        { name: 'CYBER_NINJA', initial: 'C' },
        { name: 'GHOST', initial: 'G' },
        { name: 'L33T_H4X0R', initial: 'L' },
        { name: 'NULL_TERMINAL', initial: 'N' },
        { name: 'W1RED', initial: 'W' },
        { name: 'ZEPHYR', initial: 'Z' },
        { name: 'ECHO', initial: 'E' }
      ];

      const userListEl = document.getElementById('userList');
      function renderMembers() {
        userListEl.innerHTML = '';
        users.forEach(u => {
          const li = document.createElement('li');
          li.className = 'user-item';
          li.setAttribute('data-user', u.name);
          li.innerHTML = `
            <div class="user-avatar">
              ${u.initial}
              <span class="online-dot"></span>
            </div>
            <span class="user-name">${u.name}</span>
          `;
          // click to open private chat (simulate by showing bubble + update tab)
          li.addEventListener('click', () => {
            document.getElementById('tabPrivate').classList.add('active');
            document.getElementById('tabGroup').classList.remove('active');
            const chatWin = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message other';
            msgDiv.innerText = `🔓 private chat with ${u.name} opened (UI only)`;
            chatWin.appendChild(msgDiv);
            // also put a little system message
            const sys = document.createElement('div');
            sys.className = 'message own';
            sys.innerText = `👾 you are now whispering to ${u.name}`;
            chatWin.appendChild(sys);
            chatWin.scrollTop = chatWin.scrollHeight;
          });
          userListEl.appendChild(li);
        });
      }
      renderMembers();

      // ----- CHAT FEATURES (auto scroll + bubbles) -----
      const chatMessages = document.getElementById('chatMessages');
      const sendBtn = document.getElementById('sendMsgBtn');
      const msgInput = document.getElementById('messageInput');
      const tabPrivate = document.getElementById('tabPrivate');
      const tabGroup = document.getElementById('tabGroup');

      function addMessage(text, isOwn = true) {
        const bubble = document.createElement('div');
        bubble.className = `message ${isOwn ? 'own' : 'other'}`;
        bubble.innerText = text;
        chatMessages.appendChild(bubble);
        chatMessages.scrollTop = chatMessages.scrollHeight; // auto scroll
      }

      sendBtn.addEventListener('click', () => {
        const txt = msgInput.value.trim();
        if (!txt) return;
        addMessage(txt, true);  // own message

        // simulate group/private variation based on active tab
        if (tabGroup.classList.contains('active')) {
          setTimeout(() => {
            addMessage('👥 GROUP: reply from MATRIX', false);
          }, 300);
        } else {
          setTimeout(() => {
            addMessage('🤖 1-to-1 echo: message received', false);
          }, 400);
        }
        msgInput.value = '';
      });

      msgInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendBtn.click();
      });

      // tab switching (just visual, keep some sample)
      tabPrivate.addEventListener('click', () => {
        tabPrivate.classList.add('active');
        tabGroup.classList.remove('active');
        addMessage('⚡ switched to private chat (simulated)', false);
      });
      tabGroup.addEventListener('click', () => {
        tabGroup.classList.add('active');
        tabPrivate.classList.remove('active');
        addMessage('🌀 you are in group chat · all agents', false);
      });

      // call buttons (only popup exists – UI only)
      document.getElementById('voiceCallBtn').addEventListener('click', () => {
        alert('🔊 VOICE call UI demo (popup visible)');
      });
      document.getElementById('videoCallBtn').addEventListener('click', () => {
        alert('📹 VIDEO call UI demo (popup visible)');
      });

      // initial dummy messages
      addMessage('👁️‍🗨️ Welcome to GOD OF SERVER. Secure link established.', false);
      addMessage('✨ use sidebar to chat with active members', true);

      // call popup interactive (just UI, no real call)
      const popup = document.getElementById('callPopup');
      popup.style.cursor = 'pointer';
      popup.addEventListener('click', () => {
        alert('📞 call popup interaction (UI mock)');
      });

      // hide login if user tries to go back (simple)
      window.addEventListener('load', () => {
        // demo: if you want to test login again, just refresh.
      });

      // also update active member click already added
      // ensure no double login
      if (app.classList.contains('active')) {
        loginScreen.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
